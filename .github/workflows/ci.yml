name: CI
run-name: CI - ${{ github.head_ref || github.ref_name }} - ${{ github.event.head_commit.message || github.event.pull_request.title }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          extensions: ctype, curl, dom, fileinfo, filter, hash, libxml, mbstring, openssl, pcntl, pcre, pdo, pdo_sqlite, session, sqlite3, tokenizer, xml, zip
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'

      - name: Copy environment file
        run: cp .env.example .env

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install application
        run: composer setup

      - name: Run tests
        run: composer test
